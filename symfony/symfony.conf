# symfony/symfony.conf
<VirtualHost *:8000> # Apache will listen on port 8000 inside the container
    # Set the document root to Symfony's public directory
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        # Allow .htaccess files to override configurations
        AllowOverride All
        # Ensure proper access control
        Order Allow,Deny
        Allow from All
        # Options for directory browsing and symlinks
        Options -Indexes +FollowSymLinks
        # Grant access to all requests
        Require all granted
    </Directory>

    # Log errors and access
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>